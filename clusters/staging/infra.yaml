---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-infra
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/cleroux-dev-homelab/flux-infra.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-infra
  namespace: flux-system
spec:
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: ./deploy
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-infra
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
